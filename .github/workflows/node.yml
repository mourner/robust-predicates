name: Node
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install dependencies
      run: npm install

    - name: Test and build
      run: npm run prepublishOnly
